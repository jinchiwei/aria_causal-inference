run:
  run_descriptor: "transport_aria_h_riskset_a4placebo"
  output_root: "/data/rauschecker2/jkw/aria/exp"
  random_seed: 42

# ---------- UCSF dataset (risk-set builder) ----------
dataset:
  name: "ucsf_aria_risk_set_proto"
  builder: "ucsf_risk_set"
  baseline_window_days: 365
  followup_window_days: 183
  followup_windows_months: [6, 12, 18, 24]
  controls_per_treated: 2
  min_controls_per_treated: 2
  paths:
    annotations: "/data/rauschecker2/jkw/aria/data/ucsf_aria/labeled/combined_annotations.xlsx"
    reports: "/data/rauschecker2/jkw/aria/data/ucsf_aria/search-pruned_aria _ lecanemab _ donanemab _ solanezumab _ aducanumab _ gantenerumab _ remternetug.xlsx"
    apoe: "/data/rauschecker2/jkw/aria/data/ucsf_aria/ucsf-aria_mrn-apoe4_Nabaan_01.17.26.xlsx"

# ---------- transportability-specific ----------
transportability:
  ucsf_builder: "ucsf_risk_set"

  a4_paths:
    adqs: "/data/rauschecker2/jkw/aria/data/a4/Clinical/Derived Data/ADQS.csv"
    dose: "/data/rauschecker2/jkw/aria/data/a4/Clinical/Raw Data/dose.csv"
    mri_reads: "/data/rauschecker2/jkw/aria/data/a4/Clinical/External Data/imaging_MRI_reads.csv"

  a4_settings:
    window_days: 183
    followup_windows_months: [6, 12, 18, 24]
    baseline_visit_code: 1
    exclude_baseline_positive_for_incident: true
    active_treatment_labels:
      - "Solanezumab"
    placebo_labels:
      - "Placebo"

  shared_covariates:
    - "age"
    - "sex"
    - "apoe_status"

# ---------- analysis ----------
analysis:
  treatment_column: "treatment"
  apoe_column: "apoe_status"

  # only aria-h is valid here because a4 does not capture aria-e.
  outcome_columns:
    - "aria_h_6mo"
    - "aria_h_12mo"
    - "aria_h_18mo"
    - "aria_h_24mo"

  categorical_covariates:
    - "sex"
  numeric_covariates:
    - "age"

  participation_model:
    type: "logistic_regression"
    C: 1.0
    max_iter: 3000

  outcome_model:
    type: "gradient_boosting"
    n_estimators: 200
    learning_rate: 0.05
    max_depth: 2

  cate_model:
    type: "random_forest"
    n_estimators: 400
    min_samples_leaf: 10
    n_jobs: -1

  propensity_clip:
    min: 0.01
    max: 0.99
  overlap_warning_thresholds:
    low: 0.05
    high: 0.95
  bootstrap_iterations: 200
