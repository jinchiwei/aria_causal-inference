run:
  run_descriptor: "ucsf_aria_dr_template"
  output_root: "/data/rauschecker2/jkw/aria/exp"
  random_seed: 42

dataset:
  name: "ucsf_aria"
  builder: "prebuilt"
  followup_windows_months: [6, 12, 18, 24]
  paths:
    cohort: "/path/to/prepared_ucsf_aria_6mo_cohort.csv"

analysis:
  estimand: "overlap"
  patient_id_column: "patient_id"
  treatment_column: "treatment"
  outcome_columns:
    - "aria_e_6mo"
    - "aria_e_12mo"
    - "aria_e_18mo"
    - "aria_e_24mo"
    - "aria_h_6mo"
    - "aria_h_12mo"
    - "aria_h_18mo"
    - "aria_h_24mo"
    - "aria_any_6mo"
    - "aria_any_12mo"
    - "aria_any_18mo"
    - "aria_any_24mo"
  apoe_column: "apoe_status"
  categorical_covariates:
    - "sex"
    - "race"
    - "ethnicity"
    - "diagnosis"
  numeric_covariates:
    - "age"
    - "education"
    - "dose_value"
  propensity_model:
    type: "logistic_regression"
    C: 1.0
    max_iter: 2000
  outcome_model:
    type: "gradient_boosting"
    n_estimators: 200
    learning_rate: 0.05
    max_depth: 2
  cate_model:
    type: "random_forest"
    n_estimators: 400
    min_samples_leaf: 10
    n_jobs: -1
  propensity_clip:
    min: 0.01
    max: 0.99
  overlap_warning_thresholds:
    low: 0.05
    high: 0.95
  bootstrap_iterations: 200
